# .github/workflows/deploy.yml
name: Deploy Next.js Portfolio to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Generate envData.js from GitHub Secrets
        run: |
          mkdir -p public/js
          cat > public/js/envData.js << 'EOF'
          window.__PROFILE_DATA__ = {
            name: "${{ secrets.NAME }}",
            title: "${{ secrets.TITLE }}",
            location: "${{ secrets.LOCATION }}",
            email: "${{ secrets.EMAIL }}",
            phone: "${{ secrets.PHONE }}",
            linkedin: "${{ secrets.LINKEDIN }}",
            skills: ${{ secrets.SKILLS }},
            experience: ${{ secrets.EXPERIENCE }},
            education: ${{ secrets.EDUCATION }},
            projects: ${{ secrets.PROJECTS }},
            blogs: ${{ secrets.BLOGS }}
          };
          EOF

      - name: Build Next.js app
        run: npm run build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out   # ✅ THIS IS THE KEY FIX

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
